services:
  - type: web
    name: kingshot-discord-bot
    env: python
    plan: free
    buildCommand: pip install -r requirements-gifts.txt
    startCommand: python main.py --no-update
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: DISCORD_TOKEN
        value: replace-me
      - key: DATABASE_DIR
        value: /data
      - key: DATABASE_URL
        sync: false
      - key: BOT_PROFILE
        value: gifts
      - key: BOT_LOW_MEM
        value: "1"
      - key: PORT
        value: 10000
